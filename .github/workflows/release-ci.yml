name: release ci
on:
  push:
    tags:
      - '*'
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      SQUIRREL_BUNDLED_RECIPES: 'lotem/rime-octagram-data lotem/rime-octagram-data@hant'
    steps:
      - name: Checkout last commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build qiwo-sync-core (universal)
        run: |
          dotnet publish qiwo-sync-core/src/qiwo-rime-sync/qiwo-rime-sync.csproj \
            --configuration Release --runtime osx-arm64 \
            --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true \
            -o qiwo-sync-core/publish/osx-arm64
          dotnet publish qiwo-sync-core/src/qiwo-rime-sync/qiwo-rime-sync.csproj \
            --configuration Release --runtime osx-x64 \
            --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true \
            -o qiwo-sync-core/publish/osx-x64
          mkdir -p qiwo-sync
          lipo -create \
            qiwo-sync-core/publish/osx-arm64/qiwo-rime-sync \
            qiwo-sync-core/publish/osx-x64/qiwo-rime-sync \
            -output qiwo-sync/qiwo-rime-sync

      - name: Clone librime source for headers
        run: rm -rf librime && git clone --depth 1 https://github.com/rime/librime.git librime

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint

      - name: Build Qiwo
        env:
          ARCHS: 'arm64 x86_64'
        run: ./action-build.sh archive

      - name: Install periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Check Unused Code
        run: periphery scan --relative-results --skip-build --index-store-path build/Index.noindex/DataStore

      - name: Build changelog
        id: release_log
        run: |
          echo 'changelog<<EOF' >> $GITHUB_OUTPUT
          ./action-changelog.sh >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
        if: startsWith(github.ref, 'refs/tags/')

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: "package/Qiwo*.pkg"
          body: |
            ${{ steps.release_log.outputs.changelog }}
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        if: ${{ github.repository == 'LeaWron/qiwo-squirrel' && github.ref == 'refs/heads/main' }}
        uses: 'marvinpinto/action-automatic-releases@latest'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: latest
          prerelease: true
          title: "Nightly Build"
          files: |
            package/Qiwo*.pkg
