name: release ci
on:
  push:
    tags:
      - '*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      SQUIRREL_BUNDLED_RECIPES: 'lotem/rime-octagram-data lotem/rime-octagram-data@hant'
    steps:
      - name: Checkout last commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build qiwo-sync-core (universal)
        run: |
          cargo build --manifest-path qiwo-sync-core/Cargo.toml --release -p qiwo-rime-sync --target aarch64-apple-darwin
          cargo build --manifest-path qiwo-sync-core/Cargo.toml --release -p qiwo-rime-sync --target x86_64-apple-darwin
          mkdir -p qiwo-sync
          lipo -create \
            qiwo-sync-core/target/aarch64-apple-darwin/release/qiwo-rime-sync \
            qiwo-sync-core/target/x86_64-apple-darwin/release/qiwo-rime-sync \
            -output qiwo-sync/qiwo-rime-sync
          chmod +x qiwo-sync/qiwo-rime-sync

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint

      - name: Build Qiwo
        env:
          ARCHS: 'arm64 x86_64'
        run: ./action-build.sh release

      - name: Package installer script
        run: |
          VERSION=$(git describe --always)
          PACKAGE_DIR="package/Qiwo-macOS-${VERSION}"
          ARCHIVE="package/Qiwo-macOS-${VERSION}.tar.gz"
          test -x build/Build/Products/Release/Qiwo.app/Contents/MacOS/qiwo-sync/qiwo-rime-sync
          rm -rf "${PACKAGE_DIR}" "${ARCHIVE}"
          mkdir -p "${PACKAGE_DIR}"
          ditto build/Build/Products/Release/Qiwo.app "${PACKAGE_DIR}/Qiwo.app"
          cp scripts/install-from-release.sh "${PACKAGE_DIR}/install.sh"
          cp scripts/postinstall "${PACKAGE_DIR}/postinstall"
          chmod +x "${PACKAGE_DIR}/install.sh" "${PACKAGE_DIR}/postinstall"
          tar -czf "${ARCHIVE}" -C package "Qiwo-macOS-${VERSION}"

      - name: Install periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Check Unused Code
        run: periphery scan --relative-results --skip-build --index-store-path build/Index.noindex/DataStore

      - name: Build changelog
        id: release_log
        run: |
          echo 'changelog<<EOF' >> $GITHUB_OUTPUT
          ./action-changelog.sh >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
        if: startsWith(github.ref, 'refs/tags/')

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: "package/Qiwo-macOS-*.tar.gz"
          body: |
            ${{ steps.release_log.outputs.changelog }}
          draft: true

      - name: Update nightly tag
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Create nightly release
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          prerelease: true
          name: "Nightly Build"
          files: |
            package/Qiwo-macOS-*.tar.gz
