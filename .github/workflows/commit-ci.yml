name: commit ci
on:
  push:
    branches:
      - '*'
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout last commit
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build qiwo-sync-core (universal)
        run: |
          dotnet publish qiwo-sync-core/src/qiwo-rime-sync/qiwo-rime-sync.csproj \
            --configuration Release --runtime osx-arm64 \
            --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true \
            -o qiwo-sync-core/publish/osx-arm64
          dotnet publish qiwo-sync-core/src/qiwo-rime-sync/qiwo-rime-sync.csproj \
            --configuration Release --runtime osx-x64 \
            --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true \
            -o qiwo-sync-core/publish/osx-x64
          mkdir -p qiwo-sync
          lipo -create \
            qiwo-sync-core/publish/osx-arm64/qiwo-rime-sync \
            qiwo-sync-core/publish/osx-x64/qiwo-rime-sync \
            -output qiwo-sync/qiwo-rime-sync

      - name: Initialize Git submodules
        run: git submodule update --init --recursive

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint

      - name: Configure build environment
        run: |
          echo git_ref_name="$(git describe --always)" >> $GITHUB_ENV

      - name: Build Qiwo
        run: ./action-build.sh package

      - name: Install periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Check Unused Code
        run: periphery scan --relative-results --skip-build --index-store-path build/Index.noindex/DataStore

      - name: Upload Qiwo artifact
        uses: actions/upload-artifact@v6
        with:
          name: Qiwo-macOS-${{ env.git_ref_name }}
          path: package/*.pkg
          retention-days: 90
