name: commit ci
on:
  push:
    branches:
      - '*'
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout last commit
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build qiwo-sync-core (universal)
        run: |
          cargo build --release --manifest-path qiwo-sync-core/Cargo.toml --target aarch64-apple-darwin
          cargo build --release --manifest-path qiwo-sync-core/Cargo.toml --target x86_64-apple-darwin
          mkdir -p qiwo-sync
          lipo -create \
            qiwo-sync-core/target/aarch64-apple-darwin/release/qiwo-rime-sync \
            qiwo-sync-core/target/x86_64-apple-darwin/release/qiwo-rime-sync \
            -output qiwo-sync/qiwo-rime-sync

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint

      - name: Configure build environment
        run: |
          echo git_ref_name="$(git describe --always)" >> $GITHUB_ENV

      - name: Build Qiwo
        run: ./action-build.sh package

      - name: Install periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Check Unused Code
        run: periphery scan --relative-results --skip-build --index-store-path build/Index.noindex/DataStore

      - name: Package one-click install zip
        run: |
          VERSION=$(git describe --always)
          STAGE_DIR="qiwo-macos-${VERSION}"
          mkdir -p "${STAGE_DIR}"
          cp -R build/Build/Products/Release/Qiwo.app "${STAGE_DIR}/"
          cp -R qiwo-sync "${STAGE_DIR}/" 2>/dev/null || true
          cat > "${STAGE_DIR}/install.sh" << 'SCRIPT'
          #!/bin/bash
          set -e
          APP_NAME="Qiwo.app"
          DST="/Library/Input Methods"
          echo "==> 更新 齐我输入法 (Qiwo) ..."
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          echo "--> 停止旧进程..."
          sudo killall -9 QiwoInputMethod 2>/dev/null || true
          sudo killall -9 Qiwo 2>/dev/null || true

          if [ -d "${DST}/${APP_NAME}" ]; then
            echo "--> 移除旧版本..."
            sudo rm -rf "${DST}/${APP_NAME}"
          fi

          echo "--> 安装 Qiwo.app 到 ${DST} ..."
          sudo cp -R "${SCRIPT_DIR}/${APP_NAME}" "${DST}/"

          echo "--> 移除隔离属性..."
          sudo xattr -r -d com.apple.quarantine "${DST}/${APP_NAME}" 2>/dev/null || true

          if [ -d "${SCRIPT_DIR}/qiwo-sync" ]; then
            echo "--> 安装同步工具..."
            sudo mkdir -p /usr/local/bin
            sudo rm -f /usr/local/bin/qiwo-rime-sync
            sudo cp "${SCRIPT_DIR}/qiwo-sync/qiwo-rime-sync" /usr/local/bin/
            sudo xattr -d com.apple.quarantine /usr/local/bin/qiwo-rime-sync 2>/dev/null || true
          fi

          echo "--> 刷新输入法注册..."
          "${DST}/${APP_NAME}/Contents/MacOS/Qiwo" --register-input-source 2>&1 | grep -v "already registered" || true
          "${DST}/${APP_NAME}/Contents/MacOS/Qiwo" --enable-input-source 2>&1 | grep -v "already enabled" || true

          echo "--> 刷新输入法菜单..."
          killall TextInputMenuAgent 2>/dev/null || true

          echo "==> 更新完成！重新切换输入法即可。"
          SCRIPT
          chmod +x "${STAGE_DIR}/install.sh"
          zip -r "qiwo-macos-${VERSION}.zip" "${STAGE_DIR}"

      - name: Upload Qiwo pkg
        uses: actions/upload-artifact@v6
        with:
          name: Qiwo-macOS-${{ env.git_ref_name }}
          path: package/*.pkg
          retention-days: 90

      - name: Upload Qiwo zip
        uses: actions/upload-artifact@v6
        with:
          name: Qiwo-macOS-portable-${{ env.git_ref_name }}
          path: qiwo-macos-*.zip
          retention-days: 90
